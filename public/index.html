<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تشخيص تسجيل الدخول</title>
<style>
body{font-family:Arial,sans-serif;padding:20px;background:#f0f0f0;}
input{width:100%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px;box-sizing:border-box;}
button{width:100%;padding:14px;font-size:16px;background:#1d4ed8;color:white;border:none;border-radius:8px;cursor:pointer;}
pre{background:#111;color:#0f0;padding:16px;border-radius:8px;font-size:13px;white-space:pre-wrap;word-break:break-all;margin-top:16px;}
.err{color:#f66;}
.ok{color:#6f6;}
</style>
</head>
<body>
<h2>🔍 اختبار تسجيل الدخول</h2>
<input type="text" id="u" placeholder="اسم المستخدم" value="admin">
<input type="text" id="p" placeholder="كلمة المرور" value="a">
<button onclick="test()">اختبر الآن</button>
<pre id="out">النتيجة ستظهر هنا...</pre>

<script>
async function test(){
  var u = document.getElementById('u').value;
  var p = document.getElementById('p').value;
  var out = document.getElementById('out');
  out.textContent = '⏳ جاري الاختبار...';
  try {
    // Test 1: direct fetch
    var body = {action:'login', username:u, password:p};
    var res = await fetch('/.netlify/functions/api', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    var status = res.status;
    var text = await res.text();
    var parsed;
    try { parsed = JSON.parse(text); } catch(e) { parsed = {raw: text}; }
    
    out.textContent = 
      'HTTP: ' + status +
      '\n\nرد السيرفر:\n' + JSON.stringify(parsed, null, 2) +
      '\n\n---\nالطلب:\n' + JSON.stringify(body, null, 2) +
      '\n\nURL: ' + window.location.origin + '/.netlify/functions/api';

    // Test 2: check if function exists
    var res2 = await fetch('/.netlify/functions/api', {method:'GET'});
    out.textContent += '\n\nGET status: ' + res2.status;
  } catch(e) {
    out.textContent = '❌ ' + e.message + '\n' + e.stack;
  }
}
</script>

</body>
</html>
