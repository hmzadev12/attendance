<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXPRO System</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #06b6d4;
            --text: #f8fafc;
            --text3: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; touch-action: pan-y;
        }

        /* تنسيق واجهة تسجيل الدخول المحدثة */
        .login-wrap {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        .login-card {
            background: var(--surface); width: 90%; max-width: 360px;
            padding: 40px 25px; border-radius: 24px;
            border: 1px solid var(--border); text-align: center;
        }

        .brand-name { font-size: 40px; margin-bottom: 5px; letter-spacing: -1px; }
        .brand-ex { color: var(--accent); font-weight: 800; }
        .brand-pro { color: #fff; font-weight: 300; }
        
        .input-group { text-align: right; margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text3); font-size: 14px; }
        
        .input-group input {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border);
            border-radius: 12px; color: #fff; box-sizing: border-box; outline: none;
        }

        .toggle-password {
            position: absolute; left: 10px; top: 35px; background: none;
            border: none; color: var(--text3); cursor: pointer; font-size: 18px;
        }

        .btn-login {
            width: 100%; padding: 14px; background: var(--accent); border: none;
            border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }

        /* منع التفاعل الوهمي للأزرار عند السحب */
        .menu-card, .btn-action, .btn-login {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div id="page-login" class="page active">
    <div class="login-wrap">
        <div class="login-card">
            <h1 class="brand-name"><span class="brand-ex">EX</span><span class="brand-pro">PRO</span></h1>
            <p style="color: var(--text3); font-size: 13px; margin-bottom: 30px;">نظام إدارة الحضور الذكي</p>
            
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="loginUser" placeholder="Username">
            </div>
            
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="loginPass" placeholder="••••••••">
                <button type="button" class="toggle-password" onclick="togglePass()">👁️</button>
            </div>
            
            <button class="btn-login" onclick="handleLogin()">دخول للنظام</button>
        </div>
    </div>
</div>

<div id="page-main" class="page">
    <div style="padding: 20px;">
        <h2>الرئيسية</h2>
        <div class="menu-card action-trigger" data-target="page-scanner" style="padding:20px; background:var(--surface); border-radius:15px; margin-bottom:10px;">
            فتح الماسح الضوئي (اضغط للدخول)
        </div>
    </div>
</div>

<script>
    // 1. وظيفة إخفاء وإظهار كلمة المرور
    function togglePass() {
        const p = document.getElementById('loginPass');
        p.type = (p.type === "password") ? "text" : "password";
    }

    // 2. حل مشكلة السحب (Scroll vs Click)
    let touchMoved = false;
    let startY = 0;

    document.addEventListener('touchstart', (e) => {
        touchMoved = false;
        startY = e.touches[0].pageY;
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if (Math.abs(e.touches[0].pageY - startY) > 10) {
            touchMoved = true; // المستخدم يقوم بالتمرير (Scroll)
        }
    }, {passive: true});

    // مراقب عام لكل الأزرار التي تفتح صفحات
    document.addEventListener('touchend', (e) => {
        const targetEl = e.target.closest('.action-trigger');
        if (targetEl && !touchMoved) {
            // تنفيذ الضغط فقط إذا لم تتحرك الصفحة
            const pageId = targetEl.getAttribute('data-target');
            goToPage(pageId);
        }
    });

    function goToPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (navigator.vibrate) navigator.vibrate(30);
    }

    async function handleLogin() {
        // منطق تسجيل الدخول الخاص بك هنا
        goToPage('page-main'); 
    }
</script>

</body>
</html>
