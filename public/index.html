<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXPRO WHITE MODE</title>
    <style>
        /* إجبار الخلفية على اللون الأبيض */
        html, body { 
            background-color: #ffffff !important; 
            color: #1a1a1a !important; 
            margin: 0; 
            font-family: sans-serif; 
        }

        /* تنسيق واجهة الدخول البيضاء */
        .login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f0f4f8; /* رمادي فاتح جداً للخلفية */
        }

        .white-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid #e1e8ed;
        }

        .ex-logo { font-size: 40px; font-weight: 800; margin-bottom: 20px; }
        .ex-blue { color: #007bff; }
        .ex-dark { color: #333; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            background: #fff !important;
            color: #000 !important;
        }

        .btn-blue {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        /* تنسيق لوحة التحكم النهارية */
        .dashboard { display: none; padding: 20px; background: #fff; min-height: 100vh; }
        .dashboard.active { display: block; }

        .top-stat {
            background: #2d3436; /* خليتها كحلي غامق جداً لتبرز الأرقام */
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .action-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-screen">
    <div class="white-card">
        <div class="ex-logo"><span class="ex-blue">EX</span><span class="ex-dark">PRO</span></div>
        <input type="text" id="u" placeholder="اسم المستخدم">
        <input type="password" id="p" placeholder="كلمة المرور">
        <button class="btn-blue" onclick="start()">دخول للنظام</button>
    </div>
</div>

<div id="mainPage" class="dashboard">
    <h2 style="color:#333">لوحة التحكم</h2>
    
    <div class="top-stat" onclick="showList()">
        <div style="font-size: 50px; font-weight: bold;">1</div>
        <div>داخل الموقع الآن</div>
        <small style="color:#aaa">(اضغط لعرض الأسماء)</small>
    </div>

    <div class="action-box">
        <div style="font-size:30px; margin-left:15px;">✅</div>
        <div><b>تسجيل دخول</b><br><small>مسح QR Code</small></div>
    </div>

    <div class="action-box">
        <div style="font-size:30px; margin-left:15px;">🚪</div>
        <div><b>تسجيل خروج</b><br><small>إنهاء العمل</small></div>
    </div>

    <button onclick="location.reload()" style="width:100%; margin-top:20px; background:none; border:1px dotted red; color:red; padding:10px; border-radius:10px;">تسجيل خروج</button>
</div>

<script>
    function start() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPage').classList.add('active');
    }
    function showList() {
        alert("القائمة: \n1- مالك علي (10:03 م)");
    }
</script>

</body>
</html>
