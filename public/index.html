<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EXPRO</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235; --border: rgba(255,255,255,0.07);
            --accent: #3b82f6; --text: #f3f4f6; --text-dim: #9ca3af; --red: #ef4444;
        }
        [data-theme='light'] {
            --bg: #f3f4f6; --surface: #ffffff; --surface2: #f9fafb; --border: #e5e7eb;
            --text: #111827; --text-dim: #6b7280;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'IBM+Plex+Sans+Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        .page { display: none; min-height: 100vh; padding: 20px; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        input { width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; margin-top: 5px; }
    </style>
</head>
<body>

<div id="page-login" class="page active" style="display:flex; flex-direction:column; justify-content:center;">
    <div style="text-align:center; margin-bottom:40px;">
        <h1 style="font-size:35px; margin:0;">EXPRO</h1>
        <p style="color:var(--text-dim); margin-top:5px;">إدارة الحضور الذكي</p>
    </div>
    <div class="card">
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور" style="margin-top:15px;">
        <button class="btn btn-primary" onclick="handleLogin()" style="margin-top:20px;">دخول</button>
    </div>
</div>

<div id="page-main" class="page">
    <div class="header">
        <h1 id="headerUser" style="margin:0; font-size:22px;">أهلاً</h1>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-ghost" style="width:45px; padding:0;" onclick="toggleTheme()" id="mainThemeBtn">🌙</button>
            <button class="btn btn-ghost" style="width:45px; padding:0;" onclick="goToPage('page-settings')">⚙️</button>
        </div>
    </div>
    <div id="admin-tools" style="display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
            <button class="btn btn-ghost" onclick="goToPage('page-guards')" style="height:80px; flex-direction:column;">🛡️ <span>الحراس</span></button>
            <button class="btn btn-ghost" onclick="goToPage('page-emps')" style="height:80px; flex-direction:column;">👥 <span>الموظفين</span></button>
            <button class="btn btn-ghost" onclick="goToPage('page-reports')" style="grid-column:span 2; height:60px;">📊 التقارير</button>
        </div>
    </div>
    <button class="btn btn-primary" style="height:120px; font-size:20px;" onclick="goToPage('page-scanner')">📷 مسح الكود</button>
    <button class="btn btn-ghost" onclick="handleLogout()" style="margin-top:20px; color:var(--red);">تسجيل الخروج</button>
</div>

<div id="page-settings" class="page">
    <div class="header">
        <button class="btn btn-ghost" style="width:45px;" onclick="goToPage('page-main')">❯</button>
        <h2>الإعدادات</h2>
        <div style="width:45px;"></div>
    </div>
    <div class="card">
        <button class="btn btn-ghost" onclick="toggleTheme()" id="setThemeBtn">تبديل الوضع 🌙</button>
    </div>
</div>

<div id="page-reports" class="page">
    <div class="header">
        <button class="btn btn-ghost" style="width:45px;" onclick="goToPage('page-main')">❯</button>
        <h2>التقارير</h2>
        <div style="width:45px;"></div>
    </div>
    <div class="card">
        <div style="display:flex; gap:10px;">
            <input type="number" id="repYear" value="2026">
            <input type="number" id="repMonth" value="4">
        </div>
        <button class="btn btn-primary" onclick="fetchMonthly()" style="margin-top:15px;">تحميل Excel</button>
    </div>
</div>

<script>
    const API_URL = '/.netlify/functions/api';
    let currentUser = null;
    let THEME = localStorage.getItem('theme') || 'dark';

    function applyTheme() {
        document.documentElement.setAttribute('data-theme', THEME);
        const icon = THEME === 'light' ? '🌙' : '☀️';
        document.querySelectorAll('button[id*="ThemeBtn"]').forEach(btn => btn.textContent = icon);
        const setBtn = document.getElementById('setThemeBtn');
        if (setBtn) setBtn.textContent = (THEME === 'light' ? 'الوضع الليلي ' : 'الوضع النهاري ') + icon;
    }

    function toggleTheme() {
        THEME = (THEME === 'dark') ? 'light' : 'dark';
        localStorage.setItem('theme', THEME);
        applyTheme();
    }

    function goToPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function handleLogin() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (!user || !pass) return alert('أدخل البيانات');

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', username: user, password: pass })
            });
            const data = await res.json();
            if (data.result && data.result.success) {
                currentUser = data.result;
                sessionStorage.setItem('attendanceUser', JSON.stringify(currentUser));
                setupMainPage();
                goToPage('page-main');
            } else {
                alert('خطأ في اسم المستخدم أو كلمة المرور');
            }
        } catch (e) { alert('خطأ في الاتصال'); }
    }

    function setupMainPage() {
        document.getElementById('headerUser').textContent = 'أهلاً ' + currentUser.name;
        document.getElementById('admin-tools').style.display = currentUser.role === 'admin' ? 'block' : 'none';
    }

    function handleLogout() {
        sessionStorage.removeItem('attendanceUser');
        location.reload();
    }

    window.addEventListener('DOMContentLoaded', () => {
        applyTheme();
        const saved = sessionStorage.getItem('attendanceUser');
        if (saved) {
            currentUser = JSON.parse(saved);
            setupMainPage();
            goToPage('page-main');
        }
    });
</script>
</body>
</html>
