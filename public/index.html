<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EXPRO - إدارة الموظفين</title>
    <style>
        :root {
            --bg: #ffffff; /* خلفية بيضاء صافية */
            --surface: #f8fafc;
            --accent: #0284c7;
            --text-main: #0f172a;
            --border: #e2e8f0;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px;
        }

        /* تنسيق بطاقة الإحصائيات العلوية */
        .stats-card {
            background: #1e293b; /* تم الإبقاء عليها غامقة للتباين */
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stats-number { font-size: 50px; font-weight: bold; }

        /* تنسيق جدول/قائمة الموظفين */
        .employee-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .emp-info { flex-grow: 1; text-align: right; }
        
        /* تنسيق الأزرار */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
        }

        .btn-edit { background-color: #0284c7; color: white; } /* زر التعديل */
        .btn-delete { background-color: #ef4444; color: white; }

        /* نافذة التعديل المنبثقة (اختياري) */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            z-index: 100;
            width: 300px;
        }
    </style>
</head>
<body>

    <div class="stats-card" onclick="viewPresent()">
        <div class="stats-number">1</div>
        <div>داخل الموقع الآن</div>
        <small>(اضغط لعرض القائمة)</small>
    </div>

    <h3>إدارة موظفي الأمن</h3>

    <div id="employeeList">
        <div class="employee-item" id="emp-22">
            <div class="emp-info">
                <strong>الموظف: 22</strong><br>
                <small>كلمة المرور: 22</small>
            </div>
            <div>
                <button class="btn btn-edit" onclick="editEmployee('22')">تعديل</button>
                <button class="btn btn-delete" onclick="deleteEmployee('22')">حذف</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <h4>تعديل بيانات الموظف</h4>
        <input type="text" id="newName" placeholder="الاسم الجديد" style="width:100%; padding:8px; margin-bottom:10px;">
        <button class="btn btn-edit" onclick="saveEdit()">حفظ التعديلات</button>
        <button class="btn" onclick="closeModal()">إلغاء</button>
    </div>

    <script>
        let currentEditId = '';

        // دالة تفعيل زر التعديل
        function editEmployee(id) {
            currentEditId = id;
            document.getElementById('editModal').style.display = 'block';
            console.log("جاري تعديل الموظف رقم: " + id);
        }

        function saveEdit() {
            const name = document.getElementById('newName').value;
            if(name) {
                alert("تم تحديث بيانات الموظف " + currentEditId + " إلى: " + name);
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // دالة عرض الحاضرين المرتبطة بالرقم العلوي
        function viewPresent() {
            alert("قائمة المتواجدين حالياً: \n1- موظف 22");
        }

        function deleteEmployee(id) {
            if(confirm("هل أنت متأكد من حذف الموظف؟")) {
                document.getElementById('emp-' + id).remove();
            }
        }
    </script>
</body>
</html>
