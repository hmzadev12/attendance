<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EXPRO - نظام الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --border: rgba(0,0,0,0.08);
            --accent: #1a9bb5;
            --text: #0f172a;
            --text2: #475569;
            --text3: #94a3b8;
            --font: 'IBM Plex Sans Arabic', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* إدارة الصفحات */
        .page {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        /* --- تصميم صفحة الدخول --- */
        .login-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg);
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(26, 155, 181, 0.2);
        }

        .login-fields {
            width: 100%;
            max-width: 350px;
            background: var(--surface);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text2);
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: var(--font);
            outline: none;
        }

        .input-group input:focus { border-color: var(--accent); }

        .pass-wrapper { position: relative; }
        
        .toggle-password {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- تصميم لوحة التحكم --- */
        .header {
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="page active">
        <div class="login-wrap">
            <div class="login-logo">EX</div>
            <h2 style="margin-bottom: 24px;">تسجيل الدخول</h2>
            <div class="login-fields">
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="admin">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="pass-wrapper">
                        <input type="password" id="password" placeholder="••••••••">
                        <span class="toggle-password" onclick="togglePass()">
                            <i id="eyeIcon" data-lucide="eye"></i>
                        </span>
                    </div>
                </div>
                <button class="login-btn" onclick="handleLogin()">دخول</button>
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="page">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i data-lucide="menu" onclick="alert('القائمة')"></i>
                <span style="font-weight: 700;">EXPRO</span>
            </div>
            <i data-lucide="log-out" onclick="logout()"></i>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h3>مرحباً بك في EXPRO</h3>
                <p style="color: var(--text2); font-size: 14px; margin-top: 8px;">النظام جاهز للعمل. ابدأ بإدارة عملياتك الآن.</p>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="card" style="text-align: center;">
                    <i data-lucide="users" style="color: var(--accent);"></i>
                    <div style="font-weight: 700; margin-top: 5px;">120</div>
                    <div style="font-size: 11px; color: var(--text2);">عميل</div>
                </div>
                <div class="card" style="text-align: center;">
                    <i data-lucide="shopping-bag" style="color: #10b981;"></i>
                    <div style="font-weight: 700; margin-top: 5px;">45</div>
                    <div style="font-size: 11px; color: var(--text2);">طلب جديد</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // تفعيل الأيقونات
        lucide.createIcons();

        // إظهار/إخفاء الباسورد
        function togglePass() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // تسجيل الدخول
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "admin" || user !== "") { // شرط بسيط للتشغيل
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('dashboardPage').classList.add('active');
            } else {
                alert("أدخل البيانات");
            }
        }

        // خروج
        function logout() {
            document.getElementById('dashboardPage').classList.remove('active');
            document.getElementById('loginPage').classList.add('active');
        }
    </script>
</body>
</html>
